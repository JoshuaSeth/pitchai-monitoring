# Production edge configuration for the Entra-authenticated operator dashboard,
# tenant-authorized E2E UI, and bearer-authenticated machine APIs.

server {
    listen 80;
    listen [::]:80;
    server_name monitoring.pitchai.net;
    server_tokens off;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name monitoring.pitchai.net;
    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/monitoring.pitchai.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/monitoring.pitchai.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;

    include /srv/pitchai-entra-sso/current/deploy/nginx/pitchai-sso-server-locations.inc;

    client_max_body_size 50m;

    location = /health {
        proxy_pass http://127.0.0.1:8111/health;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Authorization "";
        proxy_set_header X-PitchAI-Email "";
        proxy_set_header X-PitchAI-User "";
    }

    # Machine integrations retain their existing bearer-token contracts. The
    # edge always removes browser identity so a caller cannot mix auth modes.
    location ^~ /api/v1/ {
        proxy_pass http://127.0.0.1:8111;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-PitchAI-Email "";
        proxy_set_header X-PitchAI-User "";
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Tenant API keys are both authentication and tenant authorization. This
    # surface is deliberately distinct from the staff operator dashboard.
    location ^~ /ui/ {
        proxy_pass http://127.0.0.1:8111;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-PitchAI-Email "";
        proxy_set_header X-PitchAI-User "";
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # The root, operator dashboard, and browser-only dashboard API aliases all
    # require the shared Microsoft 365 session before reaching the app.
    location / {
        include /srv/pitchai-entra-sso/current/deploy/nginx/pitchai-sso-protected-location.inc;

        proxy_pass http://127.0.0.1:8111;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
