server {
    listen 80;
    listen [::]:80;
    server_name codexusage.pitchai.net;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name codexusage.pitchai.net;

    ssl_certificate /etc/letsencrypt/live/codexusage.pitchai.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/codexusage.pitchai.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;

    include /srv/pitchai-entra-sso/current/deploy/nginx/pitchai-sso-server-locations.inc;

    location = /healthz {
        proxy_pass http://127.0.0.1:8124/healthz;
        proxy_set_header Host $host;
        proxy_set_header Authorization "";
        proxy_set_header X-PitchAI-Email "";
        proxy_set_header X-PitchAI-User "";
        proxy_http_version 1.1;
    }

    location / {
        include /srv/pitchai-entra-sso/current/deploy/nginx/pitchai-sso-protected-location.inc;

        proxy_pass http://127.0.0.1:8124;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_connect_timeout 5s;
        proxy_read_timeout 35s;
        client_max_body_size 32k;
    }
}
